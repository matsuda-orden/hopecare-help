name: ヘルプサイト ビルド & デプロイ

on:
  # 20分ごとに自動実行（Notionで公開ステータスに変更後、最大20分で反映）
  schedule:
    - cron: '*/20 * * * *'

  # GitHub の Actions タブから手動で即時実行できるボタン
  workflow_dispatch:

# GitHub Pages への書き込み権限
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. リポジトリをチェックアウト
      - name: コードを取得
        uses: actions/checkout@v4

      # 2. Node.js セットアップ
      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 依存パッケージをインストール
      - name: パッケージインストール
        run: npm ci

      # 4. ビルド（Notion API → index.html + images/ 生成）
      - name: ビルド実行
        run: npm run build
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}

      # 5. デプロイ用ファイルを dist/ にまとめる
      - name: デプロイ用ファイルを準備
        run: |
          mkdir -p dist
          cp index.html dist/
          cp -r images dist/

      # 6. GitHub Pages へデプロイ（gh-pages ブランチに push）
      - name: GitHub Pages へデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
